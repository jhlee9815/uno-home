version: 2
project:
  name: Pesse Apple Demo
  figmaFileKey: 9cevQvPHlQ5vZv5Pz3QaLL
pathResolution:
  base: config-dir
  description: All relative paths in this file are resolved from the directory containing this config file.

# Audit overrides — excludes intentional reference frames from `npm run figma:audit`.
audit:
  excludeNodeIds:
    - "22:129"  # Icon library (Lucide variant set) — false-positive detached styles
    - "2:2"     # Apple-inspired DS Preview (page 2 reference) — not tracked
    - "79:306"  # Sibling copy of the DS Preview frame — same policy as 2:2

# Tokens — report-only for Pesse demo (no auto-token-apply target yet)
tokens:
  source:
    file: ../../tokens.json
  output:
    css: ../src/index.css
  automation:
    classes:
      - token
    apply: report-only

components: {}
compositions: {}


