version: 2
project:
  name: Pesse Apple Demo
  figmaFileKey: 9cevQvPHlQ5vZv5Pz3QaLL
pathResolution:
  base: config-dir
  description: All relative paths in this file are resolved from the directory containing this config file.

# Audit overrides — excludes intentional reference frames from `npm run figma:audit`.
# 22:129 is the Lucide icon library; treating it as a violation is a false positive.
audit:
  excludeNodeIds:
    - "22:129"  # Icon library (Lucide variant set)

# Tokens — report-only for Pesse demo (no auto-token-apply target yet)
tokens:
  source:
    file: ../../tokens.json
  output:
    css: ../src/index.css
  automation:
    classes:
      - token
    apply: report-only

components: {}
compositions: {}

screens:
  # Codex's earlier preview frame — tracking only.
  # Audit skipped because the page is a hand-authored DS reference where
  # raw hex/font values are intentional (not a token-binding violation).
  figma_appleInspiredDesignSystemGeneratedPreview_2_2:
    figmaNodeId: "2:2"
    figmaNodeName: Apple-inspired Design System / Generated Preview
    figmaNodePath:
      - Apple-inspired DS Preview
    code: ../src/screens/FigmaFrameTracking.ts
    targetType: screen
    automation:
      apply: report-only
      audit: skip
      allowedClasses:
        - token
        - text
        - layout
        - structure

  # Wrapper containing the 3 Pesse phones — tracking only (children mapped separately)
  figma_pesseAppleInspired3Screens_7_2:
    figmaNodeId: "7:2"
    figmaNodeName: Pesse Apple-inspired — 3 screens
    figmaNodePath:
      - Apple-inspired DS Preview
    code: ../src/screens/FigmaFrameTracking.ts
    targetType: screen
    automation:
      apply: report-only
      allowedClasses:
        - token
        - text
        - layout
        - structure

  # Pesse Home — report-only (visual track only)
  pesse_home:
    figmaNodeId: "7:3"
    figmaNodeName: Phone · Home — Balance
    figmaNodePath:
      - Apple-inspired DS Preview
      - Pesse Apple-inspired — 3 screens
    code: ../src/screens/PesseHomeScreen.tsx
    targetType: screen
    route: /pesse/home
    automation:
      apply: report-only
      allowedClasses:
        - token
        - text
        - component-props
        - layout
        - structure

  # Pesse Cards — report-only
  pesse_cards:
    figmaNodeId: "7:4"
    figmaNodeName: Phone · Cards — Select Card
    figmaNodePath:
      - Apple-inspired DS Preview
      - Pesse Apple-inspired — 3 screens
    code: ../src/screens/PesseCardsScreen.tsx
    targetType: screen
    route: /pesse/cards
    automation:
      apply: report-only
      allowedClasses:
        - token
        - text
        - component-props
        - layout
        - structure

  # Pesse Send Money — text auto-apply enabled (demo target)
