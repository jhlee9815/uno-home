name: designer-approval

on:
  issues:
    types: [labeled]

concurrency:
  group: cs-main-writer-${{ github.ref }}
  cancel-in-progress: false      # figma-pipeline과 공유. main의 .automation/cs/ 동시 push 차단.

jobs:
  designer-approval:
    if: github.event.label.name == 'designer-approved' || github.event.label.name == 'designer-rejected'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Record designer decision
        run: npm run figma:designer-approval
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit manifest transition
        if: github.ref == 'refs/heads/main'
        run: |
          # Use status (not diff --quiet) so untracked manifest files are detected.
          if [ -z "$(git status --porcelain -- .automation/cs)" ]; then
            echo "No manifest change to commit"
            exit 0
          fi
          # Approval script may leave HEAD on designer-approved/<csId> later
          # (Phase B). Move manifest delta aside, return to clean main, reapply,
          # commit + push manifest-only. Fail loud if any step fails.
          if ! git stash push -u -m "manifest-transition" -- .automation/cs/; then
            echo "stash push failed; aborting"
            exit 1
          fi
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          if ! git stash pop; then
            echo "stash pop failed; manifest delta still on stash. Aborting."
            git stash list
            exit 1
          fi
          git config user.name "designer-bot"
          git config user.email "designer-bot@users.noreply.github.com"
          git add .automation/cs
          git commit -m "Record designer decision for ${{ github.event.issue.number }}"
          git push origin HEAD:main
