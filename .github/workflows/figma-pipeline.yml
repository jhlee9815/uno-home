name: figma-pipeline

on:
  repository_dispatch:
    types: [figma-file-update]   # task-5 Cloudflare Worker가 이걸 호출
  schedule:
    - cron: '0 */2 * * *'        # 2시간 cron 안전망 (webhook 누락 대비)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'manual'

concurrency:
  group: cs-main-writer-${{ github.ref }}
  cancel-in-progress: false      # designer-approval과 공유. main의 .automation/cs/ 동시 push 차단.

jobs:
  figma-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write             # auto-apply branch push
      pull-requests: write        # PR create/update (task-3)
      issues: write               # report-only Issue (task-3)
    env:
      # Required
      FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
      # Optional notifications (task-3)
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      # Extraction-friendly env overrides (task-7에서 본격 활용, 미설정 시 default)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      FIGMA_FILE_KEY: ${{ vars.FIGMA_FILE_KEY }}
      FIGMA_CONFIG_DIR: ${{ vars.FIGMA_CONFIG_DIR }}
      FIGMA_VERIFY_BUILD_CMD: ${{ vars.FIGMA_VERIFY_BUILD_CMD }}
      FIGMA_VERIFY_LINT_CMD: ${{ vars.FIGMA_VERIFY_LINT_CMD }}
      FIGMA_VERIFY_PORT: ${{ vars.FIGMA_VERIFY_PORT }}
      FIGMA_VERIFY_VIEWPORT_WIDTH: ${{ vars.FIGMA_VERIFY_VIEWPORT_WIDTH }}
      FIGMA_VERIFY_VIEWPORT_HEIGHT: ${{ vars.FIGMA_VERIFY_VIEWPORT_HEIGHT }}
      FIGMA_PROMOTE_PORT: ${{ vars.FIGMA_PROMOTE_PORT }}
      FIGMA_SMOKE_KEYS: ${{ vars.FIGMA_SMOKE_KEYS }}

    steps:
      - name: Checkout (full history for baseline diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write .env from secrets
        run: |
          echo "FIGMA_TOKEN=${FIGMA_TOKEN}" > .env
          chmod 600 .env

      - name: Trigger summary
        run: |
          echo "Trigger: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Reason: ${{ github.event.inputs.reason }}"
          fi
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "Event action: ${{ github.event.action }}"
            echo 'Figma payload: ${{ toJson(github.event.client_payload) }}'
          fi

      - name: Run figma pipeline
        id: pipeline
        run: |
          set -o pipefail
          set +e
          npm run figma:run 2>&1 | tee /tmp/pipeline.log
          PIPELINE_EXIT=${PIPESTATUS[0]}
          set -e

          # Strip ANSI color codes so grep extractors don't pick up escape digits
          sed -E 's/\x1b\[[0-9;]*[a-zA-Z]//g' /tmp/pipeline.log > /tmp/pipeline.clean.log

          # Capture latest cs id for downstream steps
          CS_FILE=$(ls -t .automation/reports/cs-*.md 2>/dev/null | head -1)
          if [ -n "$CS_FILE" ]; then
            CS_ID=$(basename "$CS_FILE" .md)
            echo "cs_id=$CS_ID" >> "$GITHUB_OUTPUT"
            echo "cs_path=$CS_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "cs_id=" >> "$GITHUB_OUTPUT"
            echo "cs_path=" >> "$GITHUB_OUTPUT"
          fi

          # Capture last "Changes: N" line from diff stage (clean log, single line)
          AUTO_COUNT=$(grep -E "Changes: [0-9]+" /tmp/pipeline.clean.log | tail -1 | sed -E 's/.*Changes:[[:space:]]*([0-9]+).*/\1/' | head -1)
          AUTO_COUNT=${AUTO_COUNT:-0}
          echo "change_count=$AUTO_COUNT" >> "$GITHUB_OUTPUT"

          # Pipeline succeeds if non-zero exit AND we still have cs report
          if [ "$PIPELINE_EXIT" != "0" ] && [ -z "$CS_FILE" ]; then
            echo "Pipeline failed without producing a report"
            exit "$PIPELINE_EXIT"
          fi
          exit 0

      - name: Pipeline summary to step summary
        if: always()
        run: |
          {
            echo "## figma-pipeline summary"
            echo ""
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- cs-id: \`${{ steps.pipeline.outputs.cs_id || 'none' }}\`"
            echo "- Changes detected: \`${{ steps.pipeline.outputs.change_count || 'unknown' }}\`"
            echo ""
            if [ -n "${{ steps.pipeline.outputs.cs_path }}" ]; then
              echo "### Change set report"
              echo ""
              echo '```markdown'
              head -60 "${{ steps.pipeline.outputs.cs_path }}" || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate designer review viewer
        if: steps.pipeline.outputs.cs_id != ''
        run: npm run figma:viewer:generate -- ${{ steps.pipeline.outputs.cs_id }}
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_VIEWER_BASE_URL: ${{ vars.FIGMA_VIEWER_BASE_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}

      - name: Publish designer review viewer
        if: steps.pipeline.outputs.cs_id != '' && hashFiles('dist-viewer/**') != ''
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-viewer
          keep_files: true
          commit_message: "Publish designer review viewer for ${{ steps.pipeline.outputs.cs_id }}"

      - name: Post-run routing (PR + Issue + Notifications)
        if: steps.pipeline.outputs.cs_id != '' && hashFiles('scripts/pipeline/post-run-actions.ts') != ''
        run: npx tsx scripts/pipeline/post-run-actions.ts ${{ steps.pipeline.outputs.cs_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRIGGER_EVENT: ${{ github.event_name }}

      - name: Persist CS manifest
        if: github.ref == 'refs/heads/main' && steps.pipeline.outputs.cs_id != '' && hashFiles('.automation/cs/*.json') != ''
        run: |
          # Status check includes untracked files; new cs manifests are
          # untracked json and `git diff --quiet` would miss them.
          if [ -z "$(git status --porcelain -- .automation/cs)" ]; then
            echo "No CS manifest change to commit"
            exit 0
          fi
          # post-run-actions may have left HEAD on designer-bot/<csId>.
          # Move manifest changes aside, switch to main, then reapply so
          # the commit lands on main only (never on the auto-apply PR branch).
          # `-u` includes untracked files so new cs json files are preserved.
          if ! git stash push -u -m "manifest-persist" -- .automation/cs/; then
            echo "stash push failed; aborting to avoid losing manifest delta"
            exit 1
          fi
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          if ! git stash pop; then
            echo "stash pop failed; manifest delta still on stash. Aborting."
            git stash list
            exit 1
          fi
          git config user.name "designer-bot"
          git config user.email "designer-bot@users.noreply.github.com"
          git add .automation/cs
          git commit -m "Record CS manifest for ${{ steps.pipeline.outputs.cs_id }}"
          git push origin HEAD:main

      - name: Cleanup .env
        if: always()
        run: rm -f .env

      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: figma-pipeline-${{ github.run_id }}
          path: |
            .automation/reports/
            .automation/snapshots/
            .automation/diffs/
            .automation/cs/
            .automation/images/snapshots/
            dist-viewer/
          retention-days: 30
          if-no-files-found: ignore
