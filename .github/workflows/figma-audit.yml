name: figma-audit

on:
  schedule:
    # Daily 00:00 UTC = 09:00 KST. Daily cadence keeps the auto-register
    # 2-sighting threshold short (~24h) without spamming the channel.
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'manual'

concurrency:
  group: figma-audit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # GITHUB_TOKEN still needs these for the audit Issue + label cleanup
      # steps. The auto-register PR push/create uses a separate GitHub App
      # installation token (see `Generate App token` step) so the resulting
      # PR fires a normal `pull_request: opened` event that pr-checks.yml
      # can subscribe to. GITHUB_TOKEN-created PRs do not cascade workflows.
      contents: read
      issues: write            # audit Issue create/close
    env:
      FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
      FIGMA_FILE_KEY: ${{ vars.FIGMA_FILE_KEY }}
      FIGMA_CONFIG_DIR: ${{ vars.FIGMA_CONFIG_DIR }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          # Always operate against main regardless of which ref the workflow
          # was dispatched from. Otherwise a manual `workflow_dispatch` from
          # a feature branch would audit that branch's mapping and open the
          # auto-register PR from a non-main base, pulling in unrelated diff.
          ref: main
          fetch-depth: 0
          # Don't leave the write-capable GITHUB_TOKEN in .git/config across
          # npm ci / npm run figma:audit / npm run figma:audit:register so
          # dependency lifecycle scripts and audit code can't reach it.
          # The push/PR step re-injects the token via git remote URL.
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Restore audit state from previous run
        uses: actions/cache@v4
        with:
          path: .automation/audit-state.json
          key: audit-state-v1-${{ github.run_id }}
          restore-keys: |
            audit-state-v1-

      - name: Write .env from secrets
        run: |
          echo "FIGMA_TOKEN=${FIGMA_TOKEN}" > .env
          chmod 600 .env

      - name: Run figma:audit
        id: audit
        run: npm run figma:audit

      - name: Cleanup .env
        if: always()
        run: rm -f .env

      - name: Auto-register surviving candidates
        id: register
        if: steps.audit.outputs.auto_register_count != '0' && steps.audit.outputs.auto_register_count != ''
        run: npm run figma:audit:register

      - name: Generate App token for auto-register PR
        id: app-token
        if: steps.register.outputs.registered_count != '0' && steps.register.outputs.registered_count != ''
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.AUDIT_APP_ID }}
          private-key: ${{ secrets.AUDIT_APP_PRIVATE_KEY }}

      - name: Open auto-register PR (when registered_count > 0)
        if: steps.register.outputs.registered_count != '0' && steps.register.outputs.registered_count != ''
        env:
          # App installation token (not GITHUB_TOKEN). PRs opened with an
          # App actor fire `pull_request: opened` like a human-authored PR,
          # so pr-checks.yml runs and the resulting check_run populates
          # the PR's statusCheckRollup. With GITHUB_TOKEN the PR was
          # cascade-blocked and required workflow_dispatch + admin merge.
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REGISTERED_ITEMS_B64: ${{ steps.register.outputs.registered_items_b64 }}
          REGISTERED_COUNT: ${{ steps.register.outputs.registered_count }}
          MAPPING_PATH: ${{ steps.register.outputs.mapping_path }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e
          DATE=$(date -u +%Y-%m-%d)

          # Reuse an already-open auto-register PR if one exists. Otherwise the
          # daily cron would stack one PR per day until a maintainer merges,
          # which spams the review queue.
          EXISTING=$(gh pr list --label auto-register --state open --limit 1 --json number,url,headRefName --jq '.[0]')
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            PR_NUM=$(echo "$EXISTING" | jq -r .number)
            PR_URL=$(echo "$EXISTING" | jq -r .url)
            echo "An auto-register PR is already open: #${PR_NUM} (${PR_URL}). Skipping new PR creation to avoid duplicates."
            gh pr comment "$PR_NUM" --body "_Audit run ${RUN_URL} sighted ${REGISTERED_COUNT} candidate(s) again. They will be picked up after this PR is merged or closed._" || true
            exit 0
          fi

          BRANCH="auto-register/audit-${DATE}"
          git config user.name "designer-bot[bot]"
          git config user.email "designer-bot[bot]@users.noreply.github.com"
          # Inject the App installation token here (checkout ran with
          # persist-credentials: false). Scoped to the push/PR window only.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Ensure the `auto-register` label exists. If a fresh-clone repo
          # gets the workflow before the label is provisioned, `gh pr create
          # --label auto-register` would fail and leak the branch.
          gh label create auto-register \
            --description "Auto-register PR from figma-audit (mapping update)" \
            --color "5319e7" 2>/dev/null || true

          # No open auto-register PR. If today's branch exists from an earlier
          # run on the same day with no PR (rare — e.g. PR was force-closed),
          # force-update it. Otherwise create fresh.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git checkout -B "$BRANCH"
            git add "${MAPPING_PATH:-config/figma-mapping.yaml}"
            git commit -m "chore(audit): refresh auto-register $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "no changes"
            git push -f origin "$BRANCH"
          else
            git checkout -b "$BRANCH"
            git add "${MAPPING_PATH:-config/figma-mapping.yaml}"
            git commit -m "chore(audit): auto-register ${REGISTERED_COUNT} frame(s)"
            git push origin "$BRANCH"
          fi

          BODY_FILE=$(mktemp)
          {
            echo "Auto-registered **${REGISTERED_COUNT}** frame(s) after surviving the audit sighting threshold."
            echo ""
            echo "These top-level frames have been present in the Figma file across multiple audit cycles, so they are promoted into \`config/figma-mapping.yaml\` with \`apply: report-only\`. Once merged, future audits will track detached-style violations inside them."
            echo ""
            echo "**Registered:**"
            echo ""
            # auto-register.ts emits a single base64-of-JSON output:
            # registered_items_b64 = base64(JSON.stringify([{nodeId, name}])).
            # JSON survives newlines/quotes/=/commas in frame names and removes
            # the parallel-array length-mismatch class of bugs the prior
            # comma+newline encoding had.
            printf '%s' "${REGISTERED_ITEMS_B64}" | base64 -d \
              | jq -r '.[] | "- `\(.nodeId)` — \(.name)"'
            echo ""
            echo "**Why a PR (not direct push):** main is protected. The \`validate\` check below must pass before merge. This PR is opened by the \`designer-bot\` GitHub App so \`pull_request: opened\` fires normally and \`pr-checks.yml\` attaches its check to this PR's head SHA — no manual dispatch needed."
            echo ""
            echo "Audit run: ${RUN_URL}"
            echo ""
            echo "_Created by figma-audit workflow._"
          } > "$BODY_FILE"

          gh pr create \
            --title "[auto-register] ${REGISTERED_COUNT} frame(s) — ${DATE}" \
            --label auto-register \
            --body-file "$BODY_FILE" \
            --head "$BRANCH" \
            --base main

      - name: Step summary
        if: always()
        run: |
          {
            echo "## figma-audit summary"
            echo ""
            echo "- detached styles: \`${{ steps.audit.outputs.detached_total }}\`"
            echo "- unregistered top-level frames: \`${{ steps.audit.outputs.unregistered_total }}\`"
            echo "- auto-register candidates: \`${{ steps.audit.outputs.auto_register_count }}\`"
            echo "- registered this run: \`${{ steps.register.outputs.registered_count || '0' }}\`"
            echo "- has violations: \`${{ steps.audit.outputs.has_violations }}\`"
            if [ -f "${{ steps.audit.outputs.audit_md }}" ]; then
              echo ""
              echo "### Audit report (first 60 lines)"
              echo ""
              echo '```markdown'
              head -60 "${{ steps.audit.outputs.audit_md }}" || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create audit Issue when violations detected
        id: audit_issue
        if: steps.audit.outputs.has_violations == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DETACHED: ${{ steps.audit.outputs.detached_total }}
          UNREG: ${{ steps.audit.outputs.unregistered_total }}
          AUTO_REG: ${{ steps.register.outputs.registered_count || '0' }}
          AUDIT_MD: ${{ steps.audit.outputs.audit_md }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e
          DATE=$(date -u +%Y-%m-%d)
          TITLE="[audit] ${DATE} — ${DETACHED} detached styles, ${UNREG} unregistered frames"

          if [ -f "$AUDIT_MD" ]; then
            REPORT_HEAD=$(head -80 "$AUDIT_MD")
          else
            REPORT_HEAD="(report file missing)"
          fi

          BODY_FILE=$(mktemp)
          {
            echo "Daily Figma DS audit found violations."
            echo ""
            echo "- Detached styles: **${DETACHED}**"
            echo "- Unregistered top-level frames: **${UNREG}**"
            echo "- Auto-registered this run: **${AUTO_REG}**"
            echo ""
            echo "Workflow run: ${RUN_URL}"
            echo "Full report attached as artifact \`figma-audit-${{ github.run_id }}\` (.automation/audits/audit-*.md)."
            echo ""
            echo "---"
            echo ""
            echo "<details><summary>Top of audit report</summary>"
            echo ""
            echo "$REPORT_HEAD"
            echo ""
            echo "</details>"
            echo ""
            echo "_Created by \`figma-audit\` workflow._"
          } > "$BODY_FILE"

          OPEN=$(gh issue list --label audit --state open --json number --jq '.[].number' || true)
          for N in $OPEN; do
            gh issue close "$N" --comment "Superseded by latest audit run (${RUN_URL})." || true
          done

          ISSUE_URL=$(gh issue create --title "$TITLE" --label audit --body-file "$BODY_FILE")
          echo "issue_url=${ISSUE_URL}" >> "$GITHUB_OUTPUT"

      - name: Notify Slack with audit summary
        if: steps.audit.outputs.has_violations == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          AUDIT_JSON: ${{ steps.audit.outputs.audit_json }}
          ISSUE_URL: ${{ steps.audit_issue.outputs.issue_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: npm run figma:audit:notify

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: figma-audit-${{ github.run_id }}
          path: |
            .automation/audits/
            .automation/audit-state.json
            .automation/audit-candidates.json
          retention-days: 90
          if-no-files-found: ignore
